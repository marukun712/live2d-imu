<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      height: 100vh;
      background: #111;
      color: #fff;
      font: 13px sans-serif;
    }

    #sidebar {
      width: 160px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    #groupList {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #groupList button {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 5px 8px;
      cursor: pointer;
      text-align: left;
    }

    #groupList button.active {
      background: #005f8f;
      border-color: #00ccff;
    }

    #main {
      flex: 1;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <input type="file" id="fileInput" accept=".psd" />
    <div id="groupList"></div>
  </div>
  <div id="main"></div>
  <script type="module" src="/src/editor.ts"></script>
</body>

</html>
