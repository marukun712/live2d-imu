<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.zinc.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      height: 100vh;
      background: #111;
      color: #fff;
      font: 13px sans-serif;
    }

    #sidebar {
      width: 20%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    #main {
      flex: 1;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <input type="file" id="fileInput" accept=".psd" />
  </div>
  <div id="main"></div>
  <script type="module" src="/src/editor.ts"></script>
</body>

</html>
